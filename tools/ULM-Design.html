<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>UML Designer Preview</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

  <!-- Mermaid UML Renderer -->
  <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>

  <!-- CodeMirror Editor -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/theme/material-darker.css">

  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.js"></script>

  <!-- jsPDF for PDF download -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

  <!-- Panzoom for zoom and move image -->
  <script src="https://cdn.jsdelivr.net/npm/@panzoom/panzoom@4.6.0/dist/panzoom.min.js"></script>

  <style>
    body {
      font-family: Arial, "Khmer OS Battambang", "Noto Sans Khmer", sans-serif;
    }

    .CodeMirror {
      height: calc(100vh - 190px);
      font-size: 14px;
      border-radius: 12px;
    }

    #preview svg {
      max-width: 100%;
      height: auto;
    }

    #modalImageContainer svg {
      max-width: none;
      height: auto;
    }

    .language-active {
      border: 2px solid #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
      font-weight: 600;
    }
  </style>
</head>

<body class="bg-gray-100 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow px-6 py-4 flex flex-col xl:flex-row gap-4 justify-between items-start xl:items-center">
    <div>
      <h1 data-i18n="appTitle" class="text-2xl font-bold text-gray-800">
        កម្មវិធីរចនា UML
      </h1>

      <p data-i18n="appSubtitle" class="text-sm text-gray-500">
        សរសេរ Mermaid UML ហើយមើលលទ្ធផលភ្លាមៗ
      </p>

      <a
        href="https://github.com/pheasa/pheasa.github.io/wiki/ULM-Design"
        target="_blank"
        rel="noopener noreferrer"
        data-i18n="howToUse"
        class="inline-block mt-2 text-sm text-blue-600 hover:text-blue-800 hover:underline"
      >
        របៀបប្រើប្រាស់?
      </a>
    </div>

    <div class="flex flex-wrap items-center gap-2">

      <!-- Language Switch -->
      <div class="flex gap-2 bg-gray-100 p-1 rounded-xl">
        <button id="btnKhmer"
          class="language-btn px-3 py-2 rounded-lg text-sm flex items-center gap-2"
          data-lang="km">
          🇰🇭 <span>ខ្មែរ</span>
        </button>

        <button id="btnEnglish"
          class="language-btn px-3 py-2 rounded-lg text-sm flex items-center gap-2"
          data-lang="en">
          🇺🇸 <span>English</span>
        </button>
      </div>

      <button id="btnClass"
        data-i18n="classUML"
        class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
        Class UML
      </button>

      <button id="btnSequence"
        data-i18n="sequenceUML"
        class="px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700">
        Sequence UML
      </button>

      <button id="btnFlowchart"
        data-i18n="flowchart"
        class="px-4 py-2 bg-orange-600 text-white rounded-lg hover:bg-orange-700">
        Flowchart
      </button>

      <button id="btnRender"
        data-i18n="render"
        class="px-4 py-2 bg-gray-800 text-white rounded-lg hover:bg-black">
        បង្ហាញលទ្ធផល
      </button>
    </div>
  </header>

  <!-- Main -->
  <main class="grid grid-cols-1 lg:grid-cols-2 gap-4 p-6">

    <!-- Editor -->
    <section class="bg-white rounded-xl shadow p-4">
      <div class="flex justify-between items-center mb-3">
        <h2 data-i18n="umlCode" class="font-semibold text-gray-700">
          កូដ UML
        </h2>

        <span data-i18n="mermaidSyntax" class="text-xs bg-gray-200 px-2 py-1 rounded">
          Mermaid Syntax
        </span>
      </div>

      <textarea id="umlCode"></textarea>
    </section>

    <!-- Preview -->
    <section class="bg-white rounded-xl shadow p-4">
      <div class="flex flex-col sm:flex-row gap-2 justify-between items-start sm:items-center mb-3">
        <div>
          <h2 data-i18n="preview" class="font-semibold text-gray-700">
            មើលលទ្ធផល
          </h2>

          <p data-i18n="clickToZoom" class="text-xs text-gray-500">
            ចុចលើ Diagram ដើម្បីបើកមើលធំ និង Zoom
          </p>
        </div>

        <div class="flex gap-2">
          <select id="downloadType"
            class="border border-gray-300 rounded-lg px-3 py-1 text-sm">
            <option value="png">PNG</option>
            <option value="jpg">JPG</option>
            <option value="pdf">PDF</option>
            <option value="svg">SVG</option>
          </select>

          <button id="btnDownload"
            data-i18n="download"
            class="px-3 py-1 text-sm bg-purple-600 text-white rounded hover:bg-purple-700">
            ទាញយក
          </button>
        </div>
      </div>

      <div id="preview"
        class="border border-dashed border-gray-300 rounded-xl min-h-[500px] p-4 overflow-auto flex items-start justify-center bg-gray-50 cursor-zoom-in">
      </div>
    </section>

  </main>

  <!-- Image Preview Modal -->
  <div id="imageModal"
    class="fixed inset-0 bg-black/80 hidden z-50 items-center justify-center">

    <div class="absolute top-4 right-4 flex flex-wrap gap-2 z-50">
      <button id="btnZoomIn"
        data-i18n="zoomIn"
        class="px-3 py-2 bg-white text-gray-800 rounded-lg hover:bg-gray-200">
        ពង្រីក +
      </button>

      <button id="btnZoomOut"
        data-i18n="zoomOut"
        class="px-3 py-2 bg-white text-gray-800 rounded-lg hover:bg-gray-200">
        បង្រួម -
      </button>

      <button id="btnResetZoom"
        data-i18n="reset"
        class="px-3 py-2 bg-white text-gray-800 rounded-lg hover:bg-gray-200">
        កំណត់ឡើងវិញ
      </button>

      <button id="btnCloseModal"
        data-i18n="close"
        class="px-3 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700">
        បិទ
      </button>
    </div>

    <div id="modalBox"
      class="w-[90vw] h-[85vh] overflow-hidden bg-white rounded-xl flex items-center justify-center">
      <div id="modalImageContainer" class="cursor-move">
        <!-- UML SVG will copy here -->
      </div>
    </div>
  </div>

  <script>
    // -----------------------------
    // Language Config
    // -----------------------------
    const LANGUAGE_STORAGE_KEY = "app_language";
    const DEFAULT_LANGUAGE = "km";
    const ALLOWED_LANGUAGES = ["en", "km"];

    function getSavedLanguage() {
      const savedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);

      if (ALLOWED_LANGUAGES.includes(savedLanguage)) {
        return savedLanguage;
      }

      localStorage.setItem(LANGUAGE_STORAGE_KEY, DEFAULT_LANGUAGE);
      return DEFAULT_LANGUAGE;
    }

    // -----------------------------
    // Language Translation
    // -----------------------------
    const translations = {
      km: {
        appTitle: "កម្មវិធីរចនា UML",
        appSubtitle: "សរសេរ Mermaid UML ហើយមើលលទ្ធផលភ្លាមៗ",
        howToUse: "របៀបប្រើប្រាស់?",
        classUML: "Class UML",
        sequenceUML: "Sequence UML",
        flowchart: "Flowchart",
        render: "បង្ហាញលទ្ធផល",
        umlCode: "កូដ UML",
        mermaidSyntax: "Mermaid Syntax",
        preview: "មើលលទ្ធផល",
        clickToZoom: "ចុចលើ Diagram ដើម្បីបើកមើលធំ និង Zoom",
        download: "ទាញយក",
        zoomIn: "ពង្រីក +",
        zoomOut: "បង្រួម -",
        reset: "កំណត់ឡើងវិញ",
        close: "បិទ",
        rendering: "កំពុងបង្ហាញ UML...",
        syntaxErrorTitle: "កូដ UML មានបញ្ហា",
        renderFirst: "សូមបង្ហាញ UML ជាមុនសិន។",
        convertError: "មិនអាចបម្លែង SVG ទៅជា Image បានទេ។"
      },
      en: {
        appTitle: "UML Designer Preview",
        appSubtitle: "Write Mermaid UML and preview instantly",
        howToUse: "How to use?",
        classUML: "Class UML",
        sequenceUML: "Sequence UML",
        flowchart: "Flowchart",
        render: "Render",
        umlCode: "UML Code",
        mermaidSyntax: "Mermaid Syntax",
        preview: "Preview",
        clickToZoom: "Click diagram to open zoom preview",
        download: "Download",
        zoomIn: "Zoom +",
        zoomOut: "Zoom -",
        reset: "Reset",
        close: "Close",
        rendering: "Rendering UML...",
        syntaxErrorTitle: "UML Syntax Error",
        renderFirst: "Please render UML first.",
        convertError: "Cannot convert SVG to image."
      }
    };

    let currentLanguage = getSavedLanguage();

    function t(key) {
      return translations[currentLanguage][key] || key;
    }

    function setLanguage(lang) {
      if (!ALLOWED_LANGUAGES.includes(lang)) {
        lang = DEFAULT_LANGUAGE;
      }

      currentLanguage = lang;

      localStorage.setItem(LANGUAGE_STORAGE_KEY, lang);

      $("html").attr("lang", lang);

      $("[data-i18n]").each(function () {
        const key = $(this).data("i18n");
        $(this).text(t(key));
      });

      $(".language-btn").removeClass("language-active");
      $(`.language-btn[data-lang="${lang}"]`).addClass("language-active");
    }

    $(".language-btn").on("click", function () {
      const lang = $(this).data("lang");

      setLanguage(lang);
    });

    // -----------------------------
    // Mermaid Config
    // -----------------------------
    mermaid.initialize({
      startOnLoad: false,
      theme: "default",
      securityLevel: "loose"
    });

    // -----------------------------
    // UML Examples
    // -----------------------------
    const classDiagram = `classDiagram
class User {
  +int id
  +string name
  +string email
  +login()
  +logout()
}

class Order {
  +int id
  +double total
  +createOrder()
  +cancelOrder()
}

class Payment {
  +int id
  +double amount
  +pay()
}

User "1" --> "many" Order
Order "1" --> "1" Payment`;

    const sequenceDiagram = `sequenceDiagram
actor User
participant App
participant API
participant Database

User->>App: Click Login
App->>API: POST /login
API->>Database: Check user
Database-->>API: User found
API-->>App: Return token
App-->>User: Show dashboard`;

    const flowchartDiagram = `flowchart TD
A[Start] --> B{User Login?}
B -- Yes --> C[Show Dashboard]
B -- No --> D[Show Login Page]
D --> E[Submit Email and Password]
E --> F{Valid?}
F -- Yes --> C
F -- No --> G[Show Error]
G --> D`;

    // -----------------------------
    // CodeMirror Editor
    // -----------------------------
    const editor = CodeMirror.fromTextArea(document.getElementById("umlCode"), {
      lineNumbers: true,
      theme: "material-darker",
      mode: "javascript"
    });

    editor.setValue(classDiagram);

    // -----------------------------
    // Render UML Preview
    // -----------------------------
    async function renderUML() {
      const code = editor.getValue();
      const preview = $("#preview");

      preview.html(`
        <div class="text-gray-500 animate-pulse">
          ${t("rendering")}
        </div>
      `);

      try {
        const id = "uml-" + Date.now();
        const result = await mermaid.render(id, code);

        preview.html(result.svg);
      } catch (error) {
        preview.html(`
          <div class="text-red-600 bg-red-50 border border-red-200 p-4 rounded-lg w-full">
            <h3 class="font-bold mb-2">${t("syntaxErrorTitle")}</h3>
            <pre class="text-sm whitespace-pre-wrap">${error.message}</pre>
          </div>
        `);
      }
    }

    // -----------------------------
    // Template Buttons
    // -----------------------------
    $("#btnClass").on("click", function () {
      editor.setValue(classDiagram);
      renderUML();
    });

    $("#btnSequence").on("click", function () {
      editor.setValue(sequenceDiagram);
      renderUML();
    });

    $("#btnFlowchart").on("click", function () {
      editor.setValue(flowchartDiagram);
      renderUML();
    });

    $("#btnRender").on("click", function () {
      renderUML();
    });

    // -----------------------------
    // Auto Render When Typing
    // -----------------------------
    let typingTimer;

    editor.on("change", function () {
      clearTimeout(typingTimer);

      typingTimer = setTimeout(function () {
        renderUML();
      }, 600);
    });

    // -----------------------------
    // Convert SVG To Canvas
    // -----------------------------
    async function getSvgAsCanvas() {
      const svg = $("#preview svg")[0];

      if (!svg) {
        alert(t("renderFirst"));
        return null;
      }

      const svgData = new XMLSerializer().serializeToString(svg);

      const svgBlob = new Blob([svgData], {
        type: "image/svg+xml;charset=utf-8"
      });

      const url = URL.createObjectURL(svgBlob);

      return new Promise((resolve) => {
        const image = new Image();

        image.onload = function () {
          const canvas = document.createElement("canvas");

          const width = image.width || svg.clientWidth || 1200;
          const height = image.height || svg.clientHeight || 800;

          canvas.width = width;
          canvas.height = height;

          const ctx = canvas.getContext("2d");

          ctx.fillStyle = "#ffffff";
          ctx.fillRect(0, 0, canvas.width, canvas.height);

          ctx.drawImage(image, 0, 0, width, height);

          URL.revokeObjectURL(url);

          resolve(canvas);
        };

        image.onerror = function () {
          URL.revokeObjectURL(url);
          alert(t("convertError"));
          resolve(null);
        };

        image.src = url;
      });
    }

    // -----------------------------
    // Download Helper
    // -----------------------------
    function downloadFile(url, fileName) {
      const link = document.createElement("a");

      link.href = url;
      link.download = fileName;
      link.click();
    }

    // -----------------------------
    // Download SVG
    // -----------------------------
    async function downloadSVG() {
      const svg = $("#preview svg")[0];

      if (!svg) {
        alert(t("renderFirst"));
        return;
      }

      const svgData = new XMLSerializer().serializeToString(svg);

      const blob = new Blob([svgData], {
        type: "image/svg+xml;charset=utf-8"
      });

      const url = URL.createObjectURL(blob);

      downloadFile(url, "uml-diagram.svg");

      URL.revokeObjectURL(url);
    }

    // -----------------------------
    // Download PNG / JPG
    // -----------------------------
    async function downloadImage(type) {
      const canvas = await getSvgAsCanvas();

      if (!canvas) return;

      const mimeType = type === "jpg" ? "image/jpeg" : "image/png";
      const extension = type === "jpg" ? "jpg" : "png";

      const imageUrl = canvas.toDataURL(mimeType, 1.0);

      downloadFile(imageUrl, `uml-diagram.${extension}`);
    }

    // -----------------------------
    // Download PDF
    // -----------------------------
    async function downloadPDF() {
      const canvas = await getSvgAsCanvas();

      if (!canvas) return;

      const imageData = canvas.toDataURL("image/png", 1.0);

      const { jsPDF } = window.jspdf;

      const pdf = new jsPDF({
        orientation: canvas.width > canvas.height ? "landscape" : "portrait",
        unit: "px",
        format: [canvas.width, canvas.height]
      });

      pdf.addImage(imageData, "PNG", 0, 0, canvas.width, canvas.height);
      pdf.save("uml-diagram.pdf");
    }

    // -----------------------------
    // Download Button
    // -----------------------------
    $("#btnDownload").on("click", async function () {
      const type = $("#downloadType").val();

      if (type === "svg") {
        await downloadSVG();
        return;
      }

      if (type === "pdf") {
        await downloadPDF();
        return;
      }

      await downloadImage(type);
    });

    // -----------------------------
    // Image Preview Modal With Zoom
    // -----------------------------
    let panzoomInstance = null;
    let wheelHandler = null;

    function openImagePreview() {
      const svg = $("#preview svg")[0];

      if (!svg) {
        alert(t("renderFirst"));
        return;
      }

      const svgClone = svg.cloneNode(true);

      $("#modalImageContainer").html("");
      $("#modalImageContainer")[0].appendChild(svgClone);

      $("#imageModal")
        .removeClass("hidden")
        .addClass("flex");

      if (panzoomInstance) {
        panzoomInstance.destroy();
        panzoomInstance = null;
      }

      const container = $("#modalImageContainer")[0];

      panzoomInstance = Panzoom(container, {
        maxScale: 8,
        minScale: 0.3,
        contain: "outside"
      });

      const parent = $("#modalBox")[0];

      if (wheelHandler) {
        parent.removeEventListener("wheel", wheelHandler);
      }

      wheelHandler = function (event) {
        panzoomInstance.zoomWithWheel(event);
      };

      parent.addEventListener("wheel", wheelHandler, {
        passive: false
      });
    }

    function closeImagePreview() {
      $("#imageModal")
        .addClass("hidden")
        .removeClass("flex");

      const parent = $("#modalBox")[0];

      if (wheelHandler) {
        parent.removeEventListener("wheel", wheelHandler);
        wheelHandler = null;
      }

      if (panzoomInstance) {
        panzoomInstance.destroy();
        panzoomInstance = null;
      }

      $("#modalImageContainer").html("");
    }

    $("#preview").on("click", function () {
      openImagePreview();
    });

    $("#btnZoomIn").on("click", function () {
      if (panzoomInstance) {
        panzoomInstance.zoomIn();
      }
    });

    $("#btnZoomOut").on("click", function () {
      if (panzoomInstance) {
        panzoomInstance.zoomOut();
      }
    });

    $("#btnResetZoom").on("click", function () {
      if (panzoomInstance) {
        panzoomInstance.reset();
      }
    });

    $("#btnCloseModal").on("click", function () {
      closeImagePreview();
    });

    $("#imageModal").on("click", function (event) {
      if (event.target.id === "imageModal") {
        closeImagePreview();
      }
    });

    $(document).on("keydown", function (event) {
      if (event.key === "Escape") {
        closeImagePreview();
      }
    });

    // -----------------------------
    // Init App
    // -----------------------------
    setLanguage(currentLanguage);
    renderUML();
  </script>

</body>
</html>
