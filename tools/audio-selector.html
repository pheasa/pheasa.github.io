  <title>Audio Frame Selector</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class"
    };
  </script>

    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

    * {
      font-family: Arial, "Khmer OS Battambang", "Noto Sans Khmer", sans-serif;
    }

    body {
      transition: background-color 0.25s ease, color 0.25s ease;
    }

      touch-action: none;

</head>

  <script>
    const THEME_STORAGE_KEY = "app_theme";
    const ALLOWED_THEMES = ["light", "dark"];
    const DEFAULT_THEME = "light";

    let currentTheme = getSavedTheme();

    function getSavedTheme() {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);

      if (ALLOWED_THEMES.includes(savedTheme)) {
        return savedTheme;
      }

      localStorage.setItem(THEME_STORAGE_KEY, DEFAULT_THEME);
      return DEFAULT_THEME;
    }

    function updateThemeButton() {
      if (currentTheme === "dark") {
        $("#btnToggleTheme").html("☀️ Light");
      } else {
        $("#btnToggleTheme").html("🌙 Dark");
      }
    }

    function applyTheme() {
      if (currentTheme === "dark") {
        $("html").addClass("dark");
      } else {
        $("html").removeClass("dark");
      }

      localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
      updateThemeButton();

      if (audioBuffer) {
        drawWaveform();
      }
    }

    $("#btnToggleTheme").on("click", function () {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme();
    });
  </script>

  <script>
    let audioBuffer = null;
    let audioContext = null;
    let sourceNode = null;

    let selStart = 0;
    let selEnd = 0;
    let hasSelection = false;

    let isDragging = false;
    let isPlaying = false;
    let originalFileName = "";

    const canvas = document.getElementById("waveformCanvas");
    const ctx = canvas.getContext("2d");

    const dropZone = document.getElementById("dropZone");
    const fileInput = document.getElementById("fileInput");

    // Show small success/error message
    function showMessage(message, type = "success") {
      const isSuccess = type === "success";

      $("#messageBox")
        .removeClass()
        .addClass(
          "rounded-xl px-4 py-3 text-sm border " +
          (isSuccess
            ? "bg-emerald-50 dark:bg-emerald-950/30 text-emerald-700 dark:text-emerald-300 border-emerald-200 dark:border-emerald-800"
            : "bg-red-50 dark:bg-red-950/30 text-red-700 dark:text-red-300 border-red-200 dark:border-red-800")
        )
        .text(message)
        .removeClass("hidden");

      setTimeout(function () {
        $("#messageBox").addClass("hidden");
      }, 2500);
    }

    // Convert Float32 audio samples to WAV data
    function encodeWavData(samples, channels, sampleRate) {
      const buffer = new ArrayBuffer(44 + samples.length * 2);
      const view = new DataView(buffer);

      const writeString = function (offset, string) {
        for (let i = 0; i < string.length; i++) {
          view.setUint8(offset + i, string.charCodeAt(i));
        }
      };

      writeString(0, "RIFF");
      view.setUint32(4, 36 + samples.length * 2, true);
      writeString(8, "WAVE");
      writeString(12, "fmt ");
      view.setUint32(16, 16, true);
      view.setUint16(20, 1, true);
      view.setUint16(22, channels, true);
      view.setUint32(24, sampleRate, true);
      view.setUint32(28, sampleRate * channels * 2, true);
      view.setUint16(32, channels * 2, true);
      view.setUint16(34, 16, true);
      writeString(36, "data");
      view.setUint32(40, samples.length * 2, true);

      let offset = 44;

      for (let i = 0; i < samples.length; i++, offset += 2) {
        const s = Math.max(-1, Math.min(1, samples[i]));
        view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7fff, true);
      }

      return buffer;
    }

    // Encode selected audio frame to WAV Blob
    function encodeWAV(audioBuffer, startTime, endTime) {
      const sampleRate = audioBuffer.sampleRate;
      const startSample = Math.floor(startTime * sampleRate);
      const endSample = Math.floor(endTime * sampleRate);
      const numChannels = audioBuffer.numberOfChannels;
      const length = Math.max(0, endSample - startSample);

      const interleaved = new Float32Array(length * numChannels);

      for (let ch = 0; ch < numChannels; ch++) {
        const channel = audioBuffer.getChannelData(ch);
        let offset = ch;

        for (let i = 0; i < length; i++) {
          interleaved[offset] = channel[startSample + i] || 0;
          offset += numChannels;
        }
      }

      const encoded = encodeWavData(interleaved, numChannels, sampleRate);
      return new Blob([encoded], { type: "audio/wav" });
    }

    // Load and decode WAV file
    async function handleFiles(files) {
      if (!files || !files[0]) return;

      const file = files[0];
      const isWav = file.name.toLowerCase().endsWith(".wav") || file.type === "audio/wav";

      if (!isWav) {
        showMessage(t("wavOnly"), "error");
        return;
      }

      try {
        stopAudio();

        originalFileName = file.name.replace(/\.[^/.]+$/, "");
        $("#fileNameText").text(file.name);

        const arrayBuffer = await file.arrayBuffer();

        audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();
        audioBuffer = await audioContext.decodeAudioData(arrayBuffer.slice(0));

        selStart = 0;
        selEnd = audioBuffer.duration;
        hasSelection = false;

        $("#controlsSection").removeClass("hidden");
        $("#totalDuration").text(audioBuffer.duration.toFixed(2) + "s");

        drawWaveform();
        updateDisplay();
        showMessage(t("loadedSuccess"), "success");
      } catch (error) {
        console.error(error);
        showMessage(t("decodeError"), "error");
      }
    }

    // Draw audio waveform
    function drawWaveform() {
      if (!audioBuffer) return;

      const isDark = $("html").hasClass("dark");
      const data = audioBuffer.getChannelData(0);

      const width = canvas.width;
      const height = canvas.height;
      const amp = height / 2;
      const step = Math.ceil(data.length / width);

      ctx.clearRect(0, 0, width, height);

      ctx.fillStyle = isDark ? "#1e293b" : "#f8fafc";
      ctx.fillRect(0, 0, width, height);

      ctx.strokeStyle = isDark ? "#64748b" : "#cbd5e1";
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(0, amp);
      ctx.lineTo(width, amp);
      ctx.stroke();

      ctx.strokeStyle = "#3b82f6";
      ctx.lineWidth = 1.5;
      ctx.beginPath();

      for (let i = 0; i < width; i++) {
        let min = 1;
        let max = -1;

        for (let j = 0; j < step; j++) {
          const index = i * step + j;

          if (index < data.length) {
            const value = data[index];
            if (value < min) min = value;
            if (value > max) max = value;
          }
        }

        ctx.moveTo(i, amp - min * amp);
        ctx.lineTo(i, amp - max * amp);
      }

      ctx.stroke();

      if (hasSelection) {
        drawSelection();
      }
    }

    // Draw selected frame area
    function drawSelection() {
      if (!audioBuffer || !hasSelection) return;

      const startPx = (selStart / audioBuffer.duration) * canvas.width;
      const endPx = (selEnd / audioBuffer.duration) * canvas.width;
      const width = endPx - startPx;

      ctx.fillStyle = "rgba(59, 130, 246, 0.18)";
      ctx.fillRect(startPx, 0, width, canvas.height);

      ctx.strokeStyle = "rgba(37, 99, 235, 0.9)";
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 4]);
      ctx.strokeRect(startPx, 0, width, canvas.height);
      ctx.setLineDash([]);

      ctx.fillStyle = "rgba(37, 99, 235, 0.95)";
      ctx.fillRect(startPx - 2, 0, 4, canvas.height);
      ctx.fillRect(endPx - 2, 0, 4, canvas.height);
    }

    // Update selected time text
    function updateDisplay() {
      if (!audioBuffer) {
        $("#startTime").text("0.00s");
        $("#endTime").text("0.00s");
        $("#selDuration").text("0.00s");
        $("#selectStatus").text(t("fullSound"));
        return;
      }

      const displayStart = hasSelection ? selStart : 0;
      const displayEnd = hasSelection ? selEnd : audioBuffer.duration;
      const duration = displayEnd - displayStart;

      $("#startTime").text(displayStart.toFixed(2) + "s");
      $("#endTime").text(displayEnd.toFixed(2) + "s");
      $("#selDuration").text(duration.toFixed(2) + "s");

      if (hasSelection) {
        $("#selectStatus").text(t("selectedFrame"));
      } else {
        $("#selectStatus").text(t("fullSound"));
      }

      drawWaveform();
    }

    // Get canvas x position for mouse/touch
    function getCanvasPosition(event) {
      const rect = canvas.getBoundingClientRect();
      const clientX = event.touches ? event.touches[0].clientX : event.clientX;
      const x = (clientX - rect.left) / rect.width;
      return Math.max(0, Math.min(1, x));
    }

    // Start selecting frame
    function startSelect(event) {
      if (!audioBuffer) return;

      event.preventDefault();

      stopAudio();
      isDragging = true;
      hasSelection = true;

      const x = getCanvasPosition(event);

      selStart = x * audioBuffer.duration;
      selEnd = selStart;

      updateDisplay();
    }

    // Update selecting frame
    function moveSelect(event) {
      if (!isDragging || !audioBuffer) return;

      event.preventDefault();

      const x = getCanvasPosition(event);
      const currentTime = x * audioBuffer.duration;

      selEnd = Math.max(0, Math.min(audioBuffer.duration, currentTime));

      if (selEnd < selStart) {
        const temp = selStart;
        selStart = selEnd;
        selEnd = temp;
      }

      updateDisplay();
    }

    // End selecting frame
    function endSelect() {
      if (!audioBuffer) return;

      isDragging = false;

      if (Math.abs(selEnd - selStart) < 0.03) {
        hasSelection = false;
        selStart = 0;
        selEnd = audioBuffer.duration;
      }

      updateDisplay();
    }

    // Play full sound when no frame selected, otherwise play selected frame
    function playAudio() {
      if (!audioBuffer || isPlaying) return;

      const playStart = hasSelection ? selStart : 0;
      const playDuration = hasSelection ? selEnd - selStart : audioBuffer.duration;

      if (playDuration <= 0) return;

      audioContext = audioContext || new (window.AudioContext || window.webkitAudioContext)();

      const src = audioContext.createBufferSource();
      src.buffer = audioBuffer;
      src.connect(audioContext.destination);
      src.start(0, playStart, playDuration);

      src.onended = function () {
        isPlaying = false;
      };

      sourceNode = src;
      isPlaying = true;
    }

    // Stop current playing sound
    function stopAudio() {
      if (sourceNode) {
        try {
          sourceNode.stop();
        } catch (e) {}
      }

      sourceNode = null;
      isPlaying = false;
    }

    // Reset selection to full sound
    function resetSelection() {
      if (!audioBuffer) return;

      stopAudio();

      selStart = 0;
      selEnd = audioBuffer.duration;
      hasSelection = false;

      updateDisplay();
    }

    // Clear all data
    function clearAll() {
      stopAudio();

      audioBuffer = null;
      selStart = 0;
      selEnd = 0;
      hasSelection = false;
      originalFileName = "";

      fileInput.value = "";
      $("#outputFileName").val("");
      $("#fileNameText").text(t("noFile"));
      $("#controlsSection").addClass("hidden");
      $("#totalDuration").text("0.00s");

      ctx.clearRect(0, 0, canvas.width, canvas.height);

      showMessage(t("cleared"), "success");
    }

    // Download selected frame or full sound
    function downloadAudio() {
      if (!audioBuffer) {
        showMessage(t("downloadError"), "error");
        return;
      }

      const start = hasSelection ? selStart : 0;
      const end = hasSelection ? selEnd : audioBuffer.duration;

      if (end - start <= 0) {
        showMessage(t("downloadError"), "error");
        return;
      }

      let fileName = $("#outputFileName").val().trim();

      if (!fileName) {
        const now = new Date();
        const timestamp =
          now.getFullYear() +
          "-" +
          String(now.getMonth() + 1).padStart(2, "0") +
          "-" +
          String(now.getDate()).padStart(2, "0") +
          "_" +
          String(now.getHours()).padStart(2, "0") +
          String(now.getMinutes()).padStart(2, "0") +
          String(now.getSeconds()).padStart(2, "0");

        fileName = originalFileName
          ? originalFileName + "_" + timestamp
          : "audio_frame_" + timestamp;
      }

      const blob = encodeWAV(audioBuffer, start, end);
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName + ".wav";

      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);

      setTimeout(function () {
        URL.revokeObjectURL(url);
      }, 100);
    }

    // Register all events
    function initEvents() {
      $("#dropZone").on("click", function () {
        fileInput.click();
      });

      $("#fileInput").on("change", function (event) {
        handleFiles(event.target.files);
      });

      $("#dropZone").on("dragover", function (event) {
        event.preventDefault();
        $(this).addClass("bg-blue-50 dark:bg-blue-950/20");
      });

      $("#dropZone").on("dragleave", function () {
        $(this).removeClass("bg-blue-50 dark:bg-blue-950/20");
      });

      $("#dropZone").on("drop", function (event) {
        event.preventDefault();
        $(this).removeClass("bg-blue-50 dark:bg-blue-950/20");
        handleFiles(event.originalEvent.dataTransfer.files);
      });

      canvas.addEventListener("mousedown", startSelect);
      canvas.addEventListener("mousemove", moveSelect);
      canvas.addEventListener("mouseup", endSelect);
      canvas.addEventListener("mouseleave", endSelect);

      canvas.addEventListener("touchstart", startSelect, { passive: false });
      canvas.addEventListener("touchmove", moveSelect, { passive: false });
      canvas.addEventListener("touchend", endSelect);

      $("#playBtn").on("click", playAudio);
      $("#stopBtn").on("click", stopAudio);
      $("#resetBtn").on("click", resetSelection);
      $("#clearBtn").on("click", clearAll);
      $("#downloadBtn").on("click", downloadAudio);
    }

    // Init app
    $(document).ready(function () {
      applyTheme();
      applyLanguage();
      initEvents();
    });
  </script>
</body>
</html>
