<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Json Format and Preview</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class"
    };
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      font-family: Arial, "Khmer OS Battambang", "Noto Sans Khmer", sans-serif;
    }

    .json-key { cursor: pointer; }
    .json-value { cursor: pointer; }

    .json-line {
      padding: 3px 6px;
      border-radius: 8px;
      transition: background-color 0.2s ease;
    }

    .json-line:hover {
      background: rgba(99, 102, 241, 0.08);
    }

    .tree-children {
      margin-left: 22px;
      border-left: 1px dashed rgba(148, 163, 184, 0.5);
      padding-left: 12px;
    }

    .tree-toggle {
      width: 18px;
      display: inline-block;
      cursor: pointer;
      color: #64748b;
    }

    .editable-input {
      border: 1px solid #6366f1;
      outline: none;
      padding: 2px 6px;
      border-radius: 6px;
      background: white;
      color: #111827;
      min-width: 80px;
    }

    .dark .editable-input {
      background: #111827;
      color: #f9fafb;
      border-color: #818cf8;
    }

    .context-menu {
      position: fixed;
      z-index: 9999;
      min-width: 210px;
      display: none;
    }

    textarea {
      tab-size: 2;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">

  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 shadow-sm backdrop-blur transition-colors duration-300 dark:border-slate-800 dark:bg-slate-900/90">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 text-slate-700 transition hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div>
          <h1 data-i18n="title" class="text-xl font-bold sm:text-2xl">Json Format and Preview</h1>
          <p data-i18n="subtitle" class="text-sm text-slate-500 dark:text-slate-400">Paste JSON data for tool format</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <button id="btnToggleLanguage" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700"></button>

        <button id="btnToggleTheme" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700"></button>
      </div>
    </div>
  </header>

  <main class="mx-auto grid max-w-7xl gap-4 px-4 py-5 lg:grid-cols-2">

    <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors duration-300 dark:border-slate-800 dark:bg-slate-900">
      <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h2 data-i18n="inputTitle" class="text-lg font-bold">JSON Input</h2>
          <p data-i18n="inputHint" class="text-sm text-slate-500 dark:text-slate-400">Paste or edit your JSON data here.</p>
        </div>

        <div class="flex flex-wrap gap-2">
          <button id="btnFormat" class="rounded-xl bg-indigo-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-indigo-700">
            <i class="fa-solid fa-wand-magic-sparkles mr-1"></i>
            <span data-i18n="format">Format</span>
          </button>

          <button id="btnPreview" class="rounded-xl bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-emerald-700">
            <i class="fa-solid fa-eye mr-1"></i>
            <span data-i18n="preview">Preview</span>
          </button>

          <button id="btnClear" class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-rose-700">
            <i class="fa-solid fa-trash mr-1"></i>
            <span data-i18n="clear">Clear</span>
          </button>
        </div>
      </div>

      <textarea id="jsonInput" spellcheck="false" class="h-[560px] w-full resize-none rounded-2xl border border-slate-200 bg-slate-50 p-4 font-mono text-sm leading-6 text-slate-900 outline-none transition focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 dark:border-slate-700 dark:bg-slate-950 dark:text-slate-100 dark:focus:border-indigo-400" placeholder='{"name":"Pheak","role":"Developer","active":true}'></textarea>

      <div id="errorBox" class="mt-4 hidden rounded-2xl border border-rose-200 bg-rose-50 p-4 text-sm text-rose-700 dark:border-rose-900 dark:bg-rose-950/40 dark:text-rose-300"></div>
    </section>

    <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors duration-300 dark:border-slate-800 dark:bg-slate-900">
      <div class="mb-4 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
        <div>
          <h2 data-i18n="previewTitle" class="text-lg font-bold">JSON Preview</h2>
          <p data-i18n="previewHint" class="text-sm text-slate-500 dark:text-slate-400">Preview JSON as tree and edit by double click.</p>
        </div>

        <div class="flex flex-wrap gap-2">
          <label class="flex cursor-pointer items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold transition dark:border-slate-700 dark:bg-slate-800">
            <input id="showTree" type="checkbox" checked class="h-4 w-4 accent-indigo-600" />
            <span data-i18n="tree">Tree</span>
          </label>

          <label class="flex cursor-pointer items-center gap-2 rounded-xl border border-slate-200 bg-slate-50 px-3 py-2 text-sm font-semibold transition dark:border-slate-700 dark:bg-slate-800">
            <input id="showType" type="checkbox" checked class="h-4 w-4 accent-indigo-600" />
            <span data-i18n="type">Type</span>
          </label>
        </div>
      </div>

      <div id="jsonPreview" class="h-[620px] overflow-auto rounded-2xl border border-slate-200 bg-slate-50 p-4 text-sm leading-7 transition-colors duration-300 dark:border-slate-700 dark:bg-slate-950">
        <div class="flex h-full flex-col items-center justify-center text-center text-slate-400">
          <i class="fa-solid fa-code mb-3 text-4xl"></i>
          <p data-i18n="emptyPreview">Paste JSON and click Preview</p>
        </div>
      </div>
    </section>
  </main>

  <div id="contextMenu" class="context-menu overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-xl dark:border-slate-700 dark:bg-slate-900">
    <button data-action="copy" class="menu-item flex w-full items-center gap-3 px-4 py-3 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">
      <i class="fa-solid fa-copy text-indigo-500"></i>
      <span data-i18n="copySelected">Copy selected</span>
    </button>

    <button data-action="add" class="menu-item flex w-full items-center gap-3 px-4 py-3 text-left text-sm hover:bg-slate-100 dark:hover:bg-slate-800">
      <i class="fa-solid fa-plus text-emerald-500"></i>
      <span data-i18n="addItem">Add item / row</span>
    </button>

    <button data-action="delete" class="menu-item flex w-full items-center gap-3 px-4 py-3 text-left text-sm text-rose-600 hover:bg-rose-50 dark:text-rose-400 dark:hover:bg-rose-950/40">
      <i class="fa-solid fa-trash"></i>
      <span data-i18n="deleteSelected">Delete selected</span>
    </button>
  </div>

  <script>
    const THEME_STORAGE_KEY = "app_theme";
    const ALLOWED_THEMES = ["light", "dark"];
    const DEFAULT_THEME = "light";

    let currentTheme = getSavedTheme();

    function getSavedTheme() {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);

      if (ALLOWED_THEMES.includes(savedTheme)) {
        return savedTheme;
      }

      localStorage.setItem(THEME_STORAGE_KEY, DEFAULT_THEME);
      return DEFAULT_THEME;
    }

    function updateThemeButton() {
      if (currentTheme === "dark") {
        $("#btnToggleTheme").html("☀️ Light");
      } else {
        $("#btnToggleTheme").html("🌙 Dark");
      }
    }

    function applyTheme() {
      if (currentTheme === "dark") {
        $("html").addClass("dark");
      } else {
        $("html").removeClass("dark");
      }

      localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
      updateThemeButton();
    }

    $("#btnToggleTheme").on("click", function () {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme();
    });
  </script>

  <script>
    const LANGUAGE_STORAGE_KEY = "app_language";
    const ALLOWED_LANGUAGES = ["km", "en"];
    const DEFAULT_LANGUAGE = "km";
    const JSON_STORAGE_KEY = "json_format_preview_data";

    let currentLanguage = getSavedLanguage();
    let currentJsonData = null;
    let contextTarget = null;

    const translations = {
      en: {
        title: "Json Format and Preview",
        subtitle: "Paste JSON data for tool format",
        inputTitle: "JSON Input",
        inputHint: "Paste or edit your JSON data here.",
        format: "Format",
        preview: "Preview",
        clear: "Clear",
        previewTitle: "JSON Preview",
        previewHint: "Preview JSON as tree and edit by double click.",
        tree: "Tree",
        type: "Type",
        emptyPreview: "Paste JSON and click Preview",
        copySelected: "Copy selected",
        addItem: "Add item / row",
        deleteSelected: "Delete selected",
        invalidJson: "Invalid JSON syntax",
        validJson: "JSON preview ready",
        confirmClear: "Do you want to clear JSON data?",
        keyPrompt: "Input new key name",
        valuePrompt: "Input value",
        addKeyPrompt: "Input key name",
        addValuePrompt: "Input value",
        addArrayValuePrompt: "Input new array value",
        copied: "Copied",
        deleted: "Deleted",
        added: "Added",
        cannotDeleteRoot: "Root data cannot delete"
      },
      km: {
        title: "Json Format and Preview",
        subtitle: "បិទភ្ជាប់ JSON សម្រាប់ format និង preview",
        inputTitle: "បញ្ចូល JSON",
        inputHint: "បិទភ្ជាប់ ឬកែ JSON នៅទីនេះ។",
        format: "Format",
        preview: "Preview",
        clear: "សម្អាត",
        previewTitle: "មើល JSON",
        previewHint: "មើលជា tree និង double click ដើម្បីកែ។",
        tree: "Tree",
        type: "ប្រភេទ",
        emptyPreview: "បិទភ្ជាប់ JSON រួចចុច Preview",
        copySelected: "Copy ចំណុចនេះ",
        addItem: "បន្ថែម item / row",
        deleteSelected: "លុបចំណុចនេះ",
        invalidJson: "JSON syntax មិនត្រឹមត្រូវ",
        validJson: "JSON preview រួចរាល់",
        confirmClear: "តើអ្នកចង់សម្អាត JSON មែនទេ?",
        keyPrompt: "បញ្ចូលឈ្មោះ key ថ្មី",
        valuePrompt: "បញ្ចូល value",
        addKeyPrompt: "បញ្ចូលឈ្មោះ key",
        addValuePrompt: "បញ្ចូល value",
        addArrayValuePrompt: "បញ្ចូល value ថ្មីក្នុង array",
        copied: "បាន Copy",
        deleted: "បានលុប",
        added: "បានបន្ថែម",
        cannotDeleteRoot: "មិនអាចលុប root data បានទេ"
      }
    };

    // Get language from localStorage only
    function getSavedLanguage() {
      const savedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);

      if (ALLOWED_LANGUAGES.includes(savedLanguage)) {
        return savedLanguage;
      }

      localStorage.setItem(LANGUAGE_STORAGE_KEY, DEFAULT_LANGUAGE);
      return DEFAULT_LANGUAGE;
    }

    // Update language button to show next language
    function updateLanguageButton() {
      if (currentLanguage === "km") {
        $("#btnToggleLanguage").html("🇺🇸 English");
      } else {
        $("#btnToggleLanguage").html("🇰🇭 ខ្មែរ");
      }
    }

    // Apply all text by current language
    function applyLanguage() {
      $("html").attr("lang", currentLanguage);

      $("[data-i18n]").each(function () {
        const key = $(this).data("i18n");
        $(this).text(translations[currentLanguage][key] || key);
      });

      localStorage.setItem(LANGUAGE_STORAGE_KEY, currentLanguage);
      updateLanguageButton();
    }

    // Get translated text
    function t(key) {
      return translations[currentLanguage][key] || key;
    }

    // Parse JSON with error message
    function parseJsonInput() {
      const text = $("#jsonInput").val().trim();

      if (!text) {
        currentJsonData = null;
        $("#errorBox").addClass("hidden").html("");
        renderEmptyPreview();
        return null;
      }

      try {
        const data = JSON.parse(text);
        currentJsonData = data;
        $("#errorBox").addClass("hidden").html("");
        return data;
      } catch (error) {
        currentJsonData = null;
        $("#errorBox")
          .removeClass("hidden")
          .html(`<strong>${t("invalidJson")}:</strong><br>${escapeHtml(error.message)}`);
        return null;
      }
    }

    // Save current input to localStorage
    function saveInput() {
      localStorage.setItem(JSON_STORAGE_KEY, $("#jsonInput").val());
    }

    // Restore saved input from localStorage
    function restoreInput() {
      const savedData = localStorage.getItem(JSON_STORAGE_KEY);

      if (savedData) {
        $("#jsonInput").val(savedData);
      } else {
        $("#jsonInput").val(JSON.stringify({
          app: "Developer Tool",
          name: "Json Format and Preview",
          active: true,
          version: 1,
          author: {
            name: "Pheak",
            role: "Developer"
          },
          tags: ["json", "format", "preview"],
          settings: null
        }, null, 2));
      }
    }

    // Format JSON input
    function formatJson() {
      const data = parseJsonInput();

      if (data === null) return;

      $("#jsonInput").val(JSON.stringify(data, null, 2));
      saveInput();
      renderPreview();
    }

    // Render empty preview message
    function renderEmptyPreview() {
      $("#jsonPreview").html(`
        <div class="flex h-full flex-col items-center justify-center text-center text-slate-400">
          <i class="fa-solid fa-code mb-3 text-4xl"></i>
          <p>${t("emptyPreview")}</p>
        </div>
      `);
    }

    // Render JSON preview tree
    function renderPreview() {
      const data = parseJsonInput();

      if (data === null) return;

      const html = renderNode(data, [], "root");
      $("#jsonPreview").html(`<div class="min-w-max">${html}</div>`);
      saveInput();
    }

    // Render one JSON node
    function renderNode(value, path, keyName) {
      const valueType = getValueType(value);
      const pathValue = encodeURIComponent(JSON.stringify(path));
      const showType = $("#showType").is(":checked");
      const isTree = $("#showTree").is(":checked");

      if (valueType === "object" || valueType === "array") {
        const isArray = valueType === "array";
        const entries = isArray ? value.map((item, index) => [index, item]) : Object.entries(value);
        const openIcon = isTree ? `<span class="tree-toggle" data-path="${pathValue}"><i class="fa-solid fa-caret-down"></i></span>` : `<span class="tree-toggle"></span>`;

        let children = entries.map(([childKey, childValue]) => {
          const childPath = path.concat([childKey]);

          return `
            <div class="json-line" data-path="${encodeURIComponent(JSON.stringify(childPath))}">
              ${renderKey(childKey, childValue, childPath, isArray)}
              ${renderNode(childValue, childPath, childKey)}
            </div>
          `;
        }).join("");

        return `
          <span>
            ${path.length === 0 ? openIcon : ""}
            <span class="font-semibold ${getKeyColorClass(value)}">${isArray ? "[" : "{"}</span>
            ${showType ? renderTypeBadge(valueType) : ""}
            <span class="text-slate-400">${entries.length} ${isArray ? "items" : "keys"}</span>
          </span>
          <div class="tree-children">
            ${children || `<div class="text-slate-400">empty</div>`}
          </div>
          <span class="font-semibold ${getKeyColorClass(value)}">${isArray ? "]" : "}"}</span>
        `;
      }

      return `
        <span class="json-value ${getValueColorClass(value)}"
              data-path="${pathValue}"
              data-type="${valueType}">
          ${formatValue(value)}
        </span>
        ${showType ? renderTypeBadge(valueType) : ""}
      `;
    }

    // Render JSON key with color by value type
    function renderKey(key, value, path, isArray) {
      if (isArray) {
        return `<span class="mr-2 text-slate-400">${key}:</span>`;
      }

      return `
        <span class="json-key mr-1 font-semibold ${getKeyColorClass(value)}"
              data-path="${encodeURIComponent(JSON.stringify(path))}">
          "${escapeHtml(key)}"
        </span>
        <span class="mr-1 text-slate-400">:</span>
      `;
    }

    // Render type badge
    function renderTypeBadge(type) {
      return `<span class="ml-2 rounded-lg bg-slate-200 px-2 py-0.5 text-xs font-semibold text-slate-600 dark:bg-slate-800 dark:text-slate-300">${type}</span>`;
    }

    // Get real JSON value type
    function getValueType(value) {
      if (value === null) return "null";
      if (Array.isArray(value)) return "array";
      return typeof value;
    }

    // Color for key based on value type
    function getKeyColorClass(value) {
      const type = getValueType(value);

      const colors = {
        string: "text-emerald-600 dark:text-emerald-400",
        number: "text-sky-600 dark:text-sky-400",
        boolean: "text-purple-600 dark:text-purple-400",
        object: "text-orange-600 dark:text-orange-400",
        array: "text-pink-600 dark:text-pink-400",
        null: "text-slate-500 dark:text-slate-400"
      };

      return colors[type] || colors.string;
    }

    // Color for value based on value type
    function getValueColorClass(value) {
      const type = getValueType(value);

      const colors = {
        string: "text-emerald-700 dark:text-emerald-300",
        number: "text-sky-700 dark:text-sky-300",
        boolean: "text-purple-700 dark:text-purple-300",
        null: "text-slate-500 dark:text-slate-400"
      };

      return colors[type] || "text-slate-900 dark:text-slate-100";
    }

    // Format JSON primitive value for display
    function formatValue(value) {
      if (typeof value === "string") return `"${escapeHtml(value)}"`;
      if (value === null) return "null";
      return escapeHtml(String(value));
    }

    // Escape HTML safely
    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // Get value by path
    function getByPath(data, path) {
      return path.reduce((obj, key) => obj[key], data);
    }

    // Set value by path
    function setByPath(data, path, newValue) {
      if (path.length === 0) {
        currentJsonData = newValue;
        return;
      }

      const parent = getByPath(data, path.slice(0, -1));
      parent[path[path.length - 1]] = newValue;
    }

    // Delete value by path
    function deleteByPath(data, path) {
      if (path.length === 0) return false;

      const parent = getByPath(data, path.slice(0, -1));
      const lastKey = path[path.length - 1];

      if (Array.isArray(parent)) {
        parent.splice(lastKey, 1);
      } else {
        delete parent[lastKey];
      }

      return true;
    }

    // Rename object key
    function renameKey(data, path, newKey) {
      if (path.length === 0) return;

      const parent = getByPath(data, path.slice(0, -1));
      const oldKey = path[path.length - 1];

      if (Array.isArray(parent)) return;
      if (!newKey || newKey === oldKey) return;

      const newParent = {};

      Object.keys(parent).forEach((key) => {
        if (key === oldKey) {
          newParent[newKey] = parent[oldKey];
        } else {
          newParent[key] = parent[key];
        }
      });

      Object.keys(parent).forEach((key) => delete parent[key]);
      Object.assign(parent, newParent);
    }

    // Convert input string to JSON value
    function parseValueFromInput(input) {
      const text = String(input).trim();

      if (text === "true") return true;
      if (text === "false") return false;
      if (text === "null") return null;
      if (text !== "" && !isNaN(text)) return Number(text);

      try {
        return JSON.parse(text);
      } catch {
        return input;
      }
    }

    // Sync preview data back to textarea
    function syncDataToInput() {
      $("#jsonInput").val(JSON.stringify(currentJsonData, null, 2));
      saveInput();
      renderPreview();
    }

    // Start inline edit for key or value
    function startInlineEdit($target, mode) {
      const path = JSON.parse(decodeURIComponent($target.data("path")));
      const currentValue = mode === "key"
        ? path[path.length - 1]
        : getByPath(currentJsonData, path);

      const displayValue = typeof currentValue === "string"
        ? currentValue
        : JSON.stringify(currentValue);

      const $input = $(`<input class="editable-input" />`).val(displayValue);
      $target.replaceWith($input);
      $input.focus().select();

      function saveEdit() {
        const newValue = $input.val();

        if (mode === "key") {
          renameKey(currentJsonData, path, newValue);
        } else {
          setByPath(currentJsonData, path, parseValueFromInput(newValue));
        }

        syncDataToInput();
      }

      $input.on("keydown", function (e) {
        if (e.key === "Enter") saveEdit();
        if (e.key === "Escape") renderPreview();
      });

      $input.on("blur", saveEdit);
    }

    // Add item based on selected type
    function addItemByContext() {
      if (!contextTarget) return;

      const path = contextTarget.path;
      const value = getByPath(currentJsonData, path);
      const type = getValueType(value);

      if (type === "object") {
        const key = prompt(t("addKeyPrompt"));
        if (!key) return;

        const inputValue = prompt(t("addValuePrompt"), "value");
        value[key] = parseValueFromInput(inputValue || "");
      } else if (type === "array") {
        const inputValue = prompt(t("addArrayValuePrompt"), "value");
        value.push(parseValueFromInput(inputValue || ""));
      } else {
        const parent = getByPath(currentJsonData, path.slice(0, -1));
        const lastKey = path[path.length - 1];

        if (Array.isArray(parent)) {
          parent.splice(lastKey + 1, 0, "");
        } else {
          const key = prompt(t("addKeyPrompt"));
          if (!key) return;
          parent[key] = "";
        }
      }

      syncDataToInput();
    }

    // Copy selected item to clipboard
    function copyContextValue() {
      if (!contextTarget) return;

      const value = getByPath(currentJsonData, contextTarget.path);
      const text = typeof value === "string" ? value : JSON.stringify(value, null, 2);

      navigator.clipboard.writeText(text);
    }

    // Delete selected item
    function deleteContextValue() {
      if (!contextTarget) return;

      const deleted = deleteByPath(currentJsonData, contextTarget.path);

      if (!deleted) {
        alert(t("cannotDeleteRoot"));
        return;
      }

      syncDataToInput();
    }

    // Show custom right click menu
    function showContextMenu(e, path) {
      e.preventDefault();

      contextTarget = { path };

      $("#contextMenu")
        .css({
          top: e.clientY + "px",
          left: e.clientX + "px"
        })
        .fadeIn(100);
    }

    // Bind all app events
    function bindEvents() {
      $("#btnToggleLanguage").on("click", function () {
        currentLanguage = currentLanguage === "km" ? "en" : "km";
        applyLanguage();
        if (currentJsonData) renderPreview();
      });

      $("#jsonInput").on("input", function () {
        saveInput();
      });

      $("#btnFormat").on("click", formatJson);
      $("#btnPreview").on("click", renderPreview);

      $("#btnClear").on("click", function () {
        if (!confirm(t("confirmClear"))) return;

        $("#jsonInput").val("");
        currentJsonData = null;
        localStorage.removeItem(JSON_STORAGE_KEY);
        $("#errorBox").addClass("hidden").html("");
        renderEmptyPreview();
      });

      $("#showTree, #showType").on("change", function () {
        if (currentJsonData !== null) renderPreview();
      });

      $(document).on("dblclick", ".json-key", function () {
        startInlineEdit($(this), "key");
      });

      $(document).on("dblclick", ".json-value", function () {
        startInlineEdit($(this), "value");
      });

      $(document).on("contextmenu", ".json-line, .json-value, .json-key", function (e) {
        const rawPath = $(this).data("path") || $(this).closest("[data-path]").data("path");
        const path = rawPath ? JSON.parse(decodeURIComponent(rawPath)) : [];
        showContextMenu(e, path);
      });

      $(document).on("click", function () {
        $("#contextMenu").fadeOut(80);
      });

      $("#contextMenu").on("click", function (e) {
        e.stopPropagation();
      });

      $(".menu-item").on("click", function () {
        const action = $(this).data("action");

        if (action === "copy") copyContextValue();
        if (action === "add") addItemByContext();
        if (action === "delete") deleteContextValue();

        $("#contextMenu").fadeOut(80);
      });
    }

    // Init app
    function initApp() {
      applyTheme();
      applyLanguage();
      restoreInput();
      bindEvents();
      renderPreview();
    }

    $(document).ready(initApp);
  </script>
</body>
</html>
