<!DOCTYPE html>
<html lang="km">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Json Format and Preview</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: "class"
    };
  </script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      font-family: Arial, "Khmer OS Battambang", "Noto Sans Khmer", sans-serif;
    }

    .json-key,
    .json-value {
      cursor: pointer;
    }

    .json-line {
      padding: 3px 6px;
      border-radius: 8px;
      transition: background-color 0.2s ease;
    }

    .json-line:hover {
      background: rgba(99, 102, 241, 0.08);
    }

    .tree-children {
      margin-left: 22px;
      border-left: 1px dashed rgba(148, 163, 184, 0.5);
      padding-left: 12px;
    }

    .tree-toggle {
      width: 18px;
      display: inline-block;
      color: #64748b;
    }

    .context-menu {
      position: fixed;
      z-index: 9999;
      min-width: 235px;
      display: none;
    }

    .modal-backdrop {
      display: none;
    }

    textarea {
      tab-size: 2;
    }

    .form-control {
      width: 100%;
      border-radius: 14px;
      border: 1px solid #cbd5e1;
      background: #f8fafc;
      padding: 10px 12px;
      outline: none;
      transition: 0.2s ease;
    }

    .form-control:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
    }

    .dark .form-control {
      border-color: #334155;
      background: #020617;
      color: #f8fafc;
    }

    .dark .form-control:focus {
      border-color: #818cf8;
    }
  </style>
</head>

<body class="min-h-screen bg-slate-100 text-slate-900 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">

  <header class="sticky top-0 z-40 border-b border-slate-200 bg-white/90 shadow-sm backdrop-blur transition-colors duration-300 dark:border-slate-800 dark:bg-slate-900/90">
    <div class="mx-auto flex max-w-7xl flex-col gap-4 px-4 py-4 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-3">
        <a href="/" class="inline-flex h-10 w-10 items-center justify-center rounded-xl bg-slate-100 text-slate-700 transition hover:bg-slate-200 dark:bg-slate-800 dark:text-slate-200 dark:hover:bg-slate-700">
          <i class="fa-solid fa-arrow-left"></i>
        </a>

        <div>
          <h1 data-i18n="title" class="text-xl font-bold sm:text-2xl">Json Format and Preview</h1>
          <p data-i18n="subtitle" class="text-sm text-slate-500 dark:text-slate-400">Paste JSON data for tool format</p>
        </div>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <button id="btnToggleLanguage" class="rounded-xl border border-slate-200 bg-white px-4 py-2 text-sm font-semibold shadow-sm transition hover:bg-slate-50 dark:border-slate-700 dark:bg-slate-800 dark:hover:bg-slate-700"></button>

      </div>
    </div>
  </header>

    <section class="rounded-2xl border border-slate-200 bg-white p-4 shadow-sm transition-colors duration-300 dark:border-slate-800 dark:bg-slate-900">

          <button id="btnClear" class="rounded-xl bg-rose-600 px-4 py-2 text-sm font-semibold text-white shadow-sm transition hover:bg-rose-700">
            <i class="fa-solid fa-trash mr-1"></i>

        </div>

  <script>
    const THEME_STORAGE_KEY = "app_theme";
    const ALLOWED_THEMES = ["light", "dark"];
    const DEFAULT_THEME = "light";

    let currentTheme = getSavedTheme();

    function getSavedTheme() {
      const savedTheme = localStorage.getItem(THEME_STORAGE_KEY);

      if (ALLOWED_THEMES.includes(savedTheme)) {
        return savedTheme;
      }

      localStorage.setItem(THEME_STORAGE_KEY, DEFAULT_THEME);
      return DEFAULT_THEME;
    }

    function updateThemeButton() {
      if (currentTheme === "dark") {
        $("#btnToggleTheme").html("☀️ Light");
      } else {
        $("#btnToggleTheme").html("🌙 Dark");
      }
    }

    function applyTheme() {
      if (currentTheme === "dark") {
        $("html").addClass("dark");
      } else {
        $("html").removeClass("dark");
      }

      localStorage.setItem(THEME_STORAGE_KEY, currentTheme);
      updateThemeButton();
    }

    $("#btnToggleTheme").on("click", function () {
      currentTheme = currentTheme === "dark" ? "light" : "dark";
      applyTheme();
    });
  </script>

        setNullSubTitle: "សូមវាយពាក្យ null ដើម្បីបញ្ជាក់។",
        setNullWarning: "Key ឬ value ដែលបានជ្រើសនឹងត្រូវប្តូរទៅជា null។",
        typeNullLabel: "សូមវាយ null",
        confirmNull: "Set Null",
        nullConfirmWrong: "សូមវាយពាក្យ null ដើម្បីបញ្ជាក់។"
      }
    };

    // Get language from localStorage only
    function getSavedLanguage() {
      const savedLanguage = localStorage.getItem(LANGUAGE_STORAGE_KEY);

      if (ALLOWED_LANGUAGES.includes(savedLanguage)) {
        return savedLanguage;
      }

      localStorage.setItem(LANGUAGE_STORAGE_KEY, DEFAULT_LANGUAGE);
      return DEFAULT_LANGUAGE;
    }

    // Update language button to show next language
    function updateLanguageButton() {
      if (currentLanguage === "km") {
        $("#btnToggleLanguage").html("🇺🇸 English");
      } else {
        $("#btnToggleLanguage").html("🇰🇭 ខ្មែរ");
      }
    }

    // Apply language text
    function applyLanguage() {
      $("html").attr("lang", currentLanguage);

      $("[data-i18n]").each(function () {
        const key = $(this).data("i18n");
        $(this).text(translations[currentLanguage][key] || key);
      });

      localStorage.setItem(LANGUAGE_STORAGE_KEY, currentLanguage);
      updateLanguageButton();
    }

    // Get translated text
    function t(key) {
      return translations[currentLanguage][key] || key;
    }

    // Parse JSON input and show syntax error above textarea
    function parseJsonInput() {
      const text = $("#jsonInput").val().trim();

      if (!text) {
        currentJsonData = null;
        $("#errorBox").addClass("hidden").html("");
        renderEmptyPreview();
        return null;
      }

      try {
        const data = JSON.parse(text);
        currentJsonData = data;
        $("#errorBox").addClass("hidden").html("");
        return data;
      } catch (error) {
        currentJsonData = null;
        $("#errorBox")
          .removeClass("hidden")
          .html(`<strong>${t("invalidJson")}:</strong><br>${escapeHtml(error.message)}`);
        return null;
      }
    }

    // Save current input to localStorage
    function saveInput() {
      localStorage.setItem(JSON_STORAGE_KEY, $("#jsonInput").val());
    }

    // Restore saved input
    function restoreInput() {
      const savedData = localStorage.getItem(JSON_STORAGE_KEY);

      if (savedData) {
        $("#jsonInput").val(savedData);
      } else {
        $("#jsonInput").val(JSON.stringify({
          app: "Developer Tool",
          name: "Json Format and Preview",
          active: true,
          version: 1,
          author: {
            name: "Pheak",
            role: "Developer",
            testing: "Hello world"
          },
          tags: ["json", "format", "preview"],
          settings: null
        }, null, 2));
      }
    }

    // Format JSON input
    function formatJson() {
      const data = parseJsonInput();

      if (data === null) return;

      $("#jsonInput").val(JSON.stringify(data, null, 2));
      saveInput();
      renderPreview();
    }

    // Render empty preview
    function renderEmptyPreview() {
      $("#jsonPreview").html(`
        <div class="flex h-full flex-col items-center justify-center text-center text-slate-400">
          <i class="fa-solid fa-code mb-3 text-4xl"></i>
          <p>${t("emptyPreview")}</p>
        </div>
      `);
    }

    // Render JSON preview
    function renderPreview() {
      const data = parseJsonInput();

      if (data === null) return;

      $("#jsonPreview").html(`<div class="min-w-max">${renderNode(data, [], "root")}</div>`);
      saveInput();
    }

    // Render JSON node
    function renderNode(value, path) {
      const valueType = getValueType(value);
      const pathValue = encodeURIComponent(JSON.stringify(path));
      const showType = $("#showType").is(":checked");
      const showTree = $("#showTree").is(":checked");

      if (valueType === "object" || valueType === "array") {
        const isArray = valueType === "array";
        const entries = isArray ? value.map((item, index) => [index, item]) : Object.entries(value);

        const children = entries.map(([childKey, childValue]) => {
          const childPath = path.concat([childKey]);

          return `
            <div class="json-line" data-path="${encodeURIComponent(JSON.stringify(childPath))}">
              ${renderKey(childKey, childValue, childPath, isArray)}
              ${renderNode(childValue, childPath)}
            </div>
          `;
        }).join("");

        return `
          <span class="json-value ${getKeyColorClass(value)}"
                data-path="${pathValue}"
                data-type="${valueType}">
            <span class="tree-toggle"><i class="fa-solid fa-caret-down"></i></span>
            <span class="font-semibold">${isArray ? "[" : "{"}</span>
            ${showType ? renderTypeBadge(valueType) : ""}
            <span class="text-slate-400">${entries.length} ${isArray ? "items" : "keys"}</span>
          </span>
          <div class="${showTree ? "tree-children" : ""}">
            ${children || `<div class="text-slate-400">empty</div>`}
          </div>
          <span class="font-semibold ${getKeyColorClass(value)}">${isArray ? "]" : "}"}</span>
        `;
      }

      return `
        <span class="json-value ${getValueColorClass(value)}"
              data-path="${pathValue}"
              data-type="${valueType}">
          ${formatValue(value)}
        </span>
        ${showType ? renderTypeBadge(valueType) : ""}
      `;
    }

    // Render key with color based on value type
    function renderKey(key, value, path, isArray) {
      if (isArray) {
        return `<span class="mr-2 text-slate-400">${key}:</span>`;
      }

      return `
        <span class="json-key mr-1 font-semibold ${getKeyColorClass(value)}"
              data-path="${encodeURIComponent(JSON.stringify(path))}">
          "${escapeHtml(key)}"
        </span>
        <span class="mr-1 text-slate-400">:</span>
      `;
    }

    // Render type badge
    function renderTypeBadge(type) {
      return `<span class="ml-2 rounded-lg bg-slate-200 px-2 py-0.5 text-xs font-semibold text-slate-600 dark:bg-slate-800 dark:text-slate-300">${type}</span>`;
    }

    // Get JSON value type
    function getValueType(value) {
      if (value === null) return "null";
      if (Array.isArray(value)) return "array";
      return typeof value;
    }

    // Get key color based on value type
    function getKeyColorClass(value) {
      const colors = {
        string: "text-emerald-600 dark:text-emerald-400",
        number: "text-sky-600 dark:text-sky-400",
        boolean: "text-purple-600 dark:text-purple-400",
        object: "text-orange-600 dark:text-orange-400",
        array: "text-pink-600 dark:text-pink-400",
        null: "text-slate-500 dark:text-slate-400"
      };

      return colors[getValueType(value)] || colors.string;
    }

    // Get value color based on value type
    function getValueColorClass(value) {
      const colors = {
        string: "text-emerald-700 dark:text-emerald-300",
        number: "text-sky-700 dark:text-sky-300",
        boolean: "text-purple-700 dark:text-purple-300",
        null: "text-slate-500 dark:text-slate-400"
      };

      return colors[getValueType(value)] || "text-slate-900 dark:text-slate-100";
    }

    // Format JSON value to display
    function formatValue(value) {
      if (typeof value === "string") return `"${escapeHtml(value)}"`;
      if (value === null) return "null";
      return escapeHtml(String(value));
    }

    // Escape HTML
    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    // Get value by path
    function getByPath(data, path) {
      if (path.length === 0) return data;
      return path.reduce((obj, key) => obj[key], data);
    }

    // Set value by path
    function setByPath(data, path, newValue) {
      if (path.length === 0) {
        currentJsonData = newValue;
        return;
      }

      const parent = getByPath(data, path.slice(0, -1));
      parent[path[path.length - 1]] = newValue;
    }

    // Delete value by path
    function deleteByPath(data, path) {
      if (path.length === 0) return false;

      const parent = getByPath(data, path.slice(0, -1));
      const lastKey = path[path.length - 1];

      if (Array.isArray(parent)) {
        parent.splice(lastKey, 1);
      } else {
        delete parent[lastKey];
      }

      return true;
    }

    // Sync preview data to textarea
    function syncDataToInput() {
      $("#jsonInput").val(JSON.stringify(currentJsonData, null, 2));
      saveInput();
      renderPreview();
    }

    // Show or hide context menu options based on selected target
    function updateContextMenuOptions(path, kind) {
      const value = getByPath(currentJsonData, path);
      const type = getValueType(value);
      const isContainer = type === "object" || type === "array";

      $("#menuAddItem").toggleClass("hidden", !isContainer);

      if (kind === "key") {
        $("#menuEditItem").toggleClass("hidden", isContainer);
        $("#menuEditText").text(t("editKey"));
        return;
      }

      $("#menuEditItem").toggleClass("hidden", isContainer);
      $("#menuEditText").text(t("editValue"));
    }

    // Open edit/add modal
    function openModal(mode, path) {
      modalMode = mode;
      modalPath = path || [];

      $("#modalError").addClass("hidden").html("");
      $("#keyFieldWrapper").addClass("hidden");
      $("#positionWrapper").addClass("hidden");
      $("#modalNoneCheck").prop("checked", false);
      $("#modalTypeSelect").prop("disabled", false);

      if (mode === "editKey") {
        if (modalPath.length === 0) {
          alert(t("rootKeyCannotEdit"));
          return;
        }

        const currentValue = getByPath(currentJsonData, modalPath);
        const currentType = getValueType(currentValue);

        if (currentType === "object" || currentType === "array") return;

        $("#modalTitle").text(t("editKeyTitle"));
        $("#modalSubTitle").text(t("editKeySubTitle"));
        $("#keyFieldWrapper").removeClass("hidden");
        $("#modalKeyInput").val(modalPath[modalPath.length - 1]);
        setModalValue(currentValue);
      }

      if (mode === "editValue") {
        const currentValue = getByPath(currentJsonData, modalPath);
        const currentType = getValueType(currentValue);

        if (currentType === "object" || currentType === "array") return;

        $("#modalTitle").text(t("editValueTitle"));
        $("#modalSubTitle").text(t("editValueSubTitle"));
        setModalValue(currentValue);
      }

      if (mode === "addItem") {
        const parentValue = getByPath(currentJsonData, modalPath);
        const parentType = getValueType(parentValue);

        if (parentType !== "object" && parentType !== "array") return;

        $("#modalTitle").text(t("addItemTitle"));
        $("#modalSubTitle").text(t("addItemSubTitle"));

        if (parentType === "object") {
          $("#keyFieldWrapper").removeClass("hidden");
          $("#modalKeyInput").val("");
        }

        if (parentType === "array") {
          $("#positionWrapper").removeClass("hidden");
        }

        setModalValue("");
      }

      updateModalFieldVisibility();
      $("#valueModal").css("display", "flex").hide().fadeIn(120);
    }

    // Close edit/add modal
    function closeModal() {
      $("#valueModal").fadeOut(100);
    }

    // Open null confirm modal
    function openNullModal(path) {
      modalPath = path || [];
      $("#nullConfirmInput").val("");
      $("#nullModalError").addClass("hidden").html("");
      $("#nullModal").css("display", "flex").hide().fadeIn(120);
      setTimeout(() => $("#nullConfirmInput").focus(), 150);
    }

    // Close null confirm modal
    function closeNullModal() {
      $("#nullModal").fadeOut(100);
    }

    // Confirm set selected value to null
    function confirmSetNull() {
      const typedValue = $("#nullConfirmInput").val().trim();

      if (typedValue !== "null") {
        $("#nullModalError")
          .removeClass("hidden")
          .html(escapeHtml(t("nullConfirmWrong")));
        return;
      }

      setByPath(currentJsonData, modalPath, null);
      syncDataToInput();
      closeNullModal();
    }

    // Set modal value by current JSON type
    function setModalValue(value) {
      const type = getValueType(value);

      $("#modalTypeSelect").val(type);
      $("#modalStringInput").val(typeof value === "string" ? value : "");
      $("#modalNumberInput").val(type === "number" ? value : "");
      $("#modalBooleanSelect").val(value === false ? "false" : "true");
      $("#modalArrayInput").val(type === "array" ? JSON.stringify(value, null, 2) : "[]");
      $("#modalObjectInput").val(type === "object" ? JSON.stringify(value, null, 2) : "{}");

      if (type === "null") {
        $("#modalNoneCheck").prop("checked", true);
      }
    }

    // Update modal field by selected type
    function updateModalFieldVisibility() {
      const isNone = $("#modalNoneCheck").is(":checked");
      const type = isNone ? "null" : $("#modalTypeSelect").val();

      $("#valueStringWrapper").addClass("hidden");
      $("#valueNumberWrapper").addClass("hidden");
      $("#valueBooleanWrapper").addClass("hidden");
      $("#valueArrayWrapper").addClass("hidden");
      $("#valueObjectWrapper").addClass("hidden");

      $("#modalTypeSelect").prop("disabled", isNone);

      if (type === "string") $("#valueStringWrapper").removeClass("hidden");
      if (type === "number") $("#valueNumberWrapper").removeClass("hidden");
      if (type === "boolean") $("#valueBooleanWrapper").removeClass("hidden");
      if (type === "array") $("#valueArrayWrapper").removeClass("hidden");
      if (type === "object") $("#valueObjectWrapper").removeClass("hidden");
    }

    // Build value from modal fields
    function buildModalValue() {
      if ($("#modalNoneCheck").is(":checked")) return null;

      const type = $("#modalTypeSelect").val();

      if (type === "string") {
        return $("#modalStringInput").val();
      }

      if (type === "number") {
        const rawValue = $("#modalNumberInput").val();
        const numberValue = Number(rawValue);

        if (rawValue === "" || Number.isNaN(numberValue)) {
          throw new Error(t("invalidNumber"));
        }

        return numberValue;
      }

      if (type === "boolean") {
        return $("#modalBooleanSelect").val() === "true";
      }

      if (type === "array") {
        const arrayValue = JSON.parse($("#modalArrayInput").val() || "[]");

        if (!Array.isArray(arrayValue)) {
          throw new Error(t("invalidArray"));
        }

        return arrayValue;
      }

      if (type === "object") {
        const objectValue = JSON.parse($("#modalObjectInput").val() || "{}");

        if (objectValue === null || Array.isArray(objectValue) || typeof objectValue !== "object") {
          throw new Error(t("invalidObject"));
        }

        return objectValue;
      }

      return null;
    }

    // Save modal action
    function saveModal() {
      try {
        $("#modalError").addClass("hidden").html("");

        if (modalMode === "editKey") {
          const newKey = $("#modalKeyInput").val().trim();

          if (!newKey) {
            throw new Error(t("keyRequired"));
          }

          const parent = getByPath(currentJsonData, modalPath.slice(0, -1));
          const oldKey = modalPath[modalPath.length - 1];
          const newValue = buildModalValue();

          if (!Array.isArray(parent)) {
            if (newKey !== oldKey && Object.prototype.hasOwnProperty.call(parent, newKey)) {
              throw new Error(t("duplicateKey"));
            }

            const newParent = {};

            Object.keys(parent).forEach((key) => {
              if (key === oldKey) {
                newParent[newKey] = newValue;
              } else {
                newParent[key] = parent[key];
              }
            });

            Object.keys(parent).forEach((key) => delete parent[key]);
            Object.assign(parent, newParent);
          }
        }

        if (modalMode === "editValue") {
          const newValue = buildModalValue();
          setByPath(currentJsonData, modalPath, newValue);
        }

        if (modalMode === "addItem") {
          const parentValue = getByPath(currentJsonData, modalPath);
          const parentType = getValueType(parentValue);
          const newValue = buildModalValue();

          if (parentType === "object") {
            const key = $("#modalKeyInput").val().trim();

            if (!key) {
              throw new Error(t("keyRequired"));
            }

            if (Object.prototype.hasOwnProperty.call(parentValue, key)) {
              throw new Error(t("duplicateKey"));
            }

            parentValue[key] = newValue;
          }

          if (parentType === "array") {
            const position = $("input[name='insertPosition']:checked").val();

            if (position === "prepend") {
              parentValue.unshift(newValue);
            } else {
              parentValue.push(newValue);
            }
          }
        }

        syncDataToInput();
        closeModal();
      } catch (error) {
        $("#modalError")
          .removeClass("hidden")
          .html(escapeHtml(error.message));
      }
    }

    // Copy selected value
    function copyContextValue() {
      if (!contextTarget) return;

      const value = getByPath(currentJsonData, contextTarget.path);
      const text = typeof value === "string" ? value : JSON.stringify(value, null, 2);

      navigator.clipboard.writeText(text);
    }

    // Delete selected value
    function deleteContextValue() {
      if (!contextTarget) return;

      const deleted = deleteByPath(currentJsonData, contextTarget.path);

      if (!deleted) {
        alert(t("cannotDeleteRoot"));
        return;
      }

      syncDataToInput();
    }

    // Show right click menu
    function showContextMenu(e, path, kind) {
      e.preventDefault();
      e.stopPropagation();

      contextTarget = { path };
      contextClickKind = kind || "value";

      updateContextMenuOptions(path, contextClickKind);

      $("#contextMenu")
        .css({
          top: e.clientY + "px",
          left: e.clientX + "px"
        })
        .fadeIn(100);
    }

    // Bind app events
    function bindEvents() {
      $("#btnToggleLanguage").on("click", function () {
        currentLanguage = currentLanguage === "km" ? "en" : "km";
        applyLanguage();
        if (currentJsonData) renderPreview();
      });

      $("#jsonInput").on("input", saveInput);

      $("#btnFormat").on("click", formatJson);
      $("#btnPreview").on("click", renderPreview);

      $("#btnClear").on("click", function () {
        if (!confirm(t("confirmClear"))) return;

        $("#jsonInput").val("");
        currentJsonData = null;
        localStorage.removeItem(JSON_STORAGE_KEY);
        $("#errorBox").addClass("hidden").html("");
        renderEmptyPreview();
      });

      $("#showTree, #showType").on("change", function () {
        if (currentJsonData !== null) renderPreview();
      });

      $(document).on("dblclick", ".json-key", function (e) {
        e.stopPropagation();

        const path = JSON.parse(decodeURIComponent($(this).data("path")));
        openModal("editKey", path);
      });

      $(document).on("dblclick", ".json-value", function (e) {
        e.stopPropagation();

        const path = JSON.parse(decodeURIComponent($(this).data("path")));
        openModal("editValue", path);
      });

      $(document).on("contextmenu", ".json-key", function (e) {
        const path = JSON.parse(decodeURIComponent($(this).data("path")));
        showContextMenu(e, path, "key");
      });

      $(document).on("contextmenu", ".json-value", function (e) {
        const path = JSON.parse(decodeURIComponent($(this).data("path")));
        showContextMenu(e, path, "value");
      });

      $(document).on("contextmenu", ".json-line", function (e) {
        if ($(e.target).closest(".json-key, .json-value").length) return;

        e.preventDefault();
        e.stopPropagation();

        const rawPath = $(this).data("path");
        const path = rawPath ? JSON.parse(decodeURIComponent(rawPath)) : [];
        showContextMenu(e, path, "value");
      });

      $(document).on("click", function () {
        $("#contextMenu").fadeOut(80);
      });

      $("#contextMenu").on("click", function (e) {
        e.stopPropagation();
      });

      $(".menu-item").on("click", function () {
        const action = $(this).data("action");

        if (action === "edit") {
          if (contextClickKind === "key") {
            openModal("editKey", contextTarget.path);
          } else {
            openModal("editValue", contextTarget.path);
          }
        }

        if (action === "copy") {
          copyContextValue();
        }

        if (action === "add") {
          openModal("addItem", contextTarget.path);
        }

        if (action === "setNull") {
          openNullModal(contextTarget.path);
        }

        if (action === "delete") {
          deleteContextValue();
        }

        $("#contextMenu").fadeOut(80);
      });

      $("#modalTypeSelect, #modalNoneCheck").on("change", updateModalFieldVisibility);

      $("#btnCloseModal, #btnCancelModal").on("click", closeModal);
      $("#btnSaveModal").on("click", saveModal);

      $("#valueModal").on("click", function (e) {
        if (e.target.id === "valueModal") {
          closeModal();
        }
      });

      $("#btnCloseNullModal, #btnCancelNullModal").on("click", closeNullModal);
      $("#btnConfirmNullModal").on("click", confirmSetNull);

      $("#nullModal").on("click", function (e) {
        if (e.target.id === "nullModal") {
          closeNullModal();
        }
      });

      $("#nullConfirmInput").on("keydown", function (e) {
        if (e.key === "Enter") {
          confirmSetNull();
        }
      });
    }

    // Init app
    function initApp() {
      applyTheme();
      applyLanguage();
      restoreInput();
      bindEvents();
      renderPreview();
    }

    $(document).ready(initApp);
  </script>
</body>
</html>
